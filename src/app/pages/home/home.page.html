<ion-content class="page-content">

  <div class="header">
    <div class="logo-container">
      <img src="assets/iconsYimgs/logoTest.png" alt="Logo The Flop" />
    </div>
  </div>

  <!-- Контейнер для текущего матча -->
  <div class="content">
    <div *ngIf="isLoading" class="loading">
      <p>Cargando... </p>
    </div>
    <div *ngIf="currentMatch" class="match-card">
      <!-- Foto -->
      <img
        *ngIf="currentMatch.photos?.length"
        [src]="currentMatch.photos[0]"
        alt="Foto de perfil"
        class="match-photo"/>

      <!-- Descripción -->
      <div class="match-description">
        {{ currentMatch.description || 'Sin descripción' }}
      </div>

      <!-- Edad / Género -->
      <div class="match-data">
        <span>{{ currentMatch.age ?? '--' }} años</span>
        <span>{{ currentMatch.gender || 'Sin especificar' }}</span>
      </div>
    </div>

    <div *ngIf="!currentMatch" class="no-matches">
      <p>No hay más coincidencias en tu ciudad</p>
    </div>
  </div>

  <div class="bottom-bar-single">
    <button class="single-btn check" (click)="onCheck()">ALL IN</button>
    <button class="single-btn cross" (click)="onCross()">PASS</button>
  </div>

  <div class="bottom-bar">
    <div class="bar-container">
      <button class="bar-btn" (click)="goHome()">
        <img src="assets/iconsYimgs/logoTest.png" alt="Logo The Flop" />
      </button>

      <!--<div class="divider"></div>-->

      <button class="bar-btn" (click)="goToSlotsGame()">🎰</button>

      <!--<div class="divider"></div>-->
      <button class="bar-btn" (click)="goToChatList()">
        <img src="assets/iconsYimgs/messege2.png" alt="Logo Mensaje">
      </button>

      <!--<div class="divider"></div>-->
      <button class="bar-btn" (click)="shout()">
        📢
      </button>
    </div>
    <div class="config">
      <button (click)="goToSettings()">
        <img src="assets/iconsYimgs/newSettings.png" alt="settings" />
      </button>
    </div>
  </div>

</ion-content>
