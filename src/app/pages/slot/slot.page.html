<ion-content class="page-content">


  <div class="content-wrapper">
    <img class="out" src="assets/icon/outOff.png">
  </div>

  <img
    src="assets/icon/Floppy.png"
    class="mascot"
    [style.transform]="'translate(' + posX + 'px,' + posY + 'px)'"
    (touchstart)="startDrag($event)"
    (touchmove)="onDrag($event)"
    (touchend)="endDrag()"
  />

  <div class="bubble" *ngIf="message">
    {{ message }}
  </div>

  <app-navbar active="game"></app-navbar>

</ion-content>
