<ion-content class="page-content">

  <div class="header">
    <h1 class="page-title">Chats</h1>
  </div>

  <div class="content-wrapper">

    <!-- SKELETON -->
    <div *ngIf="loading">

      <div *ngFor="let s of [1,2,3]" class="match-item">

        <div class="chat-card skeleton">

          <div class="profile-image skeleton-img"></div>

          <div class="chat-info">
            <div class="skeleton-text name"></div>
            <div class="skeleton-text message"></div>
          </div>

          <div class="chat-meta">
            <div class="skeleton-text time"></div>
          </div>

        </div>

      </div>

    </div>

    <!-- MATCH LIST -->
    <div *ngIf="!loading">

      <ng-container *ngFor="let match of matches; let i = index">

        <div class="match-item">

          <div class="chat-card" (click)="goToChat(match.id)">

            <div class="profile-image">
              <img [src]="match.photo">
            </div>

            <div class="chat-info">
              <h2 class="chat-name">{{ match.name }}</h2>
              <p class="last-message">
                Ultimo mensaje: {{ match.lastMessage }}
              </p>
            </div>

            <div class="chat-meta">
              <span class="chat-time">{{ match.time }}</span>
            </div>

          </div>

        </div>

        <!-- DIVIDER -->
        <div class="divider-line" *ngIf="i < matches.length - 1"></div>

      </ng-container>

    </div>

    <!-- EMPTY -->
    <div *ngIf="!loading && matches.length === 0" class="no-chats">
      <p>No tienes conversaciones aún</p>
    </div>

  </div>

  <div class="bottom-bar">
    <div class="bar-container">
      <button class="bar-btn" (click)="goHome()">
        <img src="assets/icon/LogoMini.png" alt="Logo The Flop" />
      </button>

      <button class="bar-btn active" (click)="goToChatList()">
        <img src="assets/iconsYimgs/messege2.png" alt="Logo Mensaje">
      </button>

      <button class="bar-btn" (click)="goStats()">
        <img src="assets/icon/statsIcon.png" alt="Logo Stats">
      </button>

      <!--<button class="bar-btn" (click)="shout()">
        📢
      </button>-->

      <button class="bar-btn" (click)="goToSlotsGame()">
        <img src="assets/icon/chip.png" alt="Logo Game">
      </button>
    </div>
    <div class="config">
      <button (click)="goToSettings()">
        <img src="assets/iconsYimgs/newSettings.png" alt="settings" />
      </button>
    </div>
  </div>

</ion-content>
